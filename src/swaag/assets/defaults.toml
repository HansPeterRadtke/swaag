# ============================================================
# swaag configuration defaults
#
# Override precedence (lowest to highest):
#   1. this file  — packaged defaults, defines every key
#   2. config/local.toml  — local override file, deep-merged at startup
#   3. SWAAG_CONFIG env var  — explicit path to an additional override
#   4. SWAAG__SECTION__KEY=value env vars  — per-key overrides (highest)
#
# Distinction between config types:
#   server/model facts  — must match the running server (e.g. context_limit)
#   user-tunable policy — safe to experiment with (ratios, limits, previews)
#   derived allocations — computed at runtime from facts × policy; never set here
#
# Sections are ordered by practical tuning likelihood / risk:
#   top  — most likely to tune, safest to change
#   bottom — less likely to tune, riskier to get wrong
# ============================================================

# -----------------------------------------------------------
# [model] — SERVER/MODEL FACTS
# These must match the running llama.cpp server and loaded model.
# context_limit in particular MUST match the server's configured value.
# -----------------------------------------------------------
[model]
base_url = "http://127.0.0.1:14829"
completion_endpoint = "/completion"
tokenize_endpoint = "/tokenize"
health_endpoint = "/health"
profile_name = "small_fast"
structured_output_mode = "post_validate"
timeout_seconds = 120
connect_timeout_seconds = 10
simple_timeout_seconds = 60
structured_timeout_seconds = 120
verification_timeout_seconds = 150
benchmark_timeout_seconds = 240
progress_poll_seconds = 5.0
max_retries = 1
temperature = 0.0
top_p = 1.0
seed = 42
context_limit = 2048
stop = ["<|eot_id|>", "<|end_of_text|>"]

# -----------------------------------------------------------
# [runtime] — OPERATIONAL LIMITS  (most user-tunable)
# Adjust these first when tuning agent behavior for a new task scope.
# -----------------------------------------------------------
[runtime]
max_tool_steps = 4
tool_call_budget = 6
max_total_actions = 12
no_progress_failure_limit = 3
verification_confidence_threshold = 0.7
capture_model_io = true
lean_on_overflow = true
strict_budget = true
max_repeated_action_occurrences = 2
max_reasoning_steps = 8
tool_timeout_seconds = 10
background_poll_seconds = 0.1

# -----------------------------------------------------------
# [tools] — TOOL EXPOSURE  (most user-tunable)
# enabled: which tools the agent may use.
# read_roots: filesystem roots the agent is allowed to read from.
# allow_side_effect_tools: set true only if destructive writes are intended.
# -----------------------------------------------------------
[tools]
enabled = ["echo", "time_now", "calculator", "list_files", "read_file", "read_text", "notes", "edit_text", "write_file", "run_tests", "shell_command"]
read_roots = ["."]
allow_stateful_tools = true
allow_side_effect_tools = false

# -----------------------------------------------------------
# [planner] — PLANNING LIMITS  (commonly tuned)
# max_plan_steps: cap on steps the planner may propose.
# max_replans: how many times the runtime may replan on failure.
# -----------------------------------------------------------
[planner]
max_plan_steps = 6
max_replans = 2

# -----------------------------------------------------------
# [context] — TOKEN RESERVE POLICY  (moderate risk)
# These are subtracted from context_limit before input budgeting.
# Too small => model truncates its own response. Too large => wastes input space.
# -----------------------------------------------------------
[context]
reserved_response_tokens = 256
reserved_summary_tokens = 196
safety_margin_tokens = 64
max_recent_messages = 8
max_compaction_rounds = 4
note_prompt_token_cap = 256
allow_estimate_fallback = true
compact_on_overflow = true

# -----------------------------------------------------------
# [sessions] — SESSION STORAGE
# Rarely changed. root: where session histories are stored.
# -----------------------------------------------------------
[sessions]
root = ".swaag/sessions"
write_projections = true

# -----------------------------------------------------------
# [environment] — SHELL / WORKSPACE SETTINGS
# shell_executable: shell used for shell_command tool.
# command_timeout_seconds: hard timeout per shell command.
# -----------------------------------------------------------
[environment]
shell_executable = "bash"
command_timeout_seconds = 30
max_capture_chars = 4000
aubro_entrypoint = ""
aubro_src = ""
aubro_timeout_seconds = 45
aubro_max_text_chars = 4000
aubro_max_results = 5
aubro_max_links = 5

# -----------------------------------------------------------
# [logging] — LOGGING LEVEL
# -----------------------------------------------------------
[logging]
level = "INFO"

# -----------------------------------------------------------
# [notes] — WORKING NOTES SUBSYSTEM LIMITS
# -----------------------------------------------------------
[notes]
max_notes = 32
max_note_chars = 2000
max_total_chars = 16000
compact_target_chars = 800

# -----------------------------------------------------------
# [reader] — SEQUENTIAL FILE READER LIMITS
# -----------------------------------------------------------
[reader]
default_chunk_chars = 4000
default_overlap_chars = 0
max_chunk_chars = 12000

# -----------------------------------------------------------
# [editor] — FILE EDITOR SETTINGS
# -----------------------------------------------------------
[editor]
create_backups = true
backup_suffix = ".bak"
allow_writes = true

# -----------------------------------------------------------
# [memory] — SEMANTIC MEMORY LIMITS
# -----------------------------------------------------------
[memory]
max_semantic_items = 128
max_retrieved_items = 6

# -----------------------------------------------------------
# [context_builder] — CONTEXT ASSEMBLY ITEM LIMITS
# -----------------------------------------------------------
[context_builder]
max_history_messages = 64
max_semantic_items = 32
max_recent_results = 16
max_environment_files = 16

# -----------------------------------------------------------
# [compression] — HISTORY COMPRESSION SETTINGS
# -----------------------------------------------------------
[compression]
max_messages_before_compress = 12
summary_chars = 800

# -----------------------------------------------------------
# [security] — TRUST AND INPUT SAFETY
# -----------------------------------------------------------
[security]
block_untrusted_semantic = true
max_external_text_chars = 8000

# -----------------------------------------------------------
# [retrieval] — RETRIEVAL BACKEND SELECTION
# backend: "llm_scoring" (default), "degraded_lexical" (offline/test)
# -----------------------------------------------------------
[retrieval]
backend = "llm_scoring"
allow_degraded_fallback = true
max_candidates_per_source = 12

# -----------------------------------------------------------
# [guidance] — AGENT GUIDANCE FILE LOADING
# -----------------------------------------------------------
[guidance]
enabled = true
global_paths = []
filenames = ["AGENTS.md", ".agent-guidance.md", "SWAAG.md"]
max_items = 32
max_tokens = 4096

# -----------------------------------------------------------
# [skills] — SKILL CATALOG LOADING
# -----------------------------------------------------------
[skills]
enabled = true
max_metadata_items = 16
max_full_instructions = 6
metadata_only_default = true

# -----------------------------------------------------------
# [prompts] — PROMPT TEMPLATE NAMES  (internal, rarely changed)
# -----------------------------------------------------------
[prompts]
standard_system_template = "system_standard.txt"
lean_system_template = "system_lean.txt"
analysis_template = "analysis_user.txt"
task_decision_template = "task_decision_user.txt"
control_template = "active_session_control_user.txt"
expansion_template = "expansion_user.txt"
planning_template = "planning_user.txt"
verification_template = "verification_user.txt"
decision_template = "decision_user.txt"
answer_template = "answer_user.txt"
summary_system_template = "summary_system.txt"
summary_template = "summary_user.txt"

# -----------------------------------------------------------
# [budget_policy] — SCALE-FREE OUTPUT/SAFETY/SECTION RATIOS
# ADVANCED TUNING — changes here affect all model calls globally.
# All ratios are multiplied by context_limit at runtime to produce
# absolute token allocations (derived allocations; never set directly).
#
# safe_input_floor_tokens: minimum input budget preserved even when
# the context is very tight (structural safety floor, not a soft guide).
# -----------------------------------------------------------
[budget_policy]
fixed_overhead_min_tokens = 160
structured_output_json_factor_default = 1.50
structured_output_json_floor_tokens = 24
structured_output_grammar_factor = 1.25
structured_output_grammar_floor_tokens = 16
safe_input_floor_tokens = 128

[budget_policy.call_classes]
analysis = "tiny"
task_decision = "tiny"
control = "tiny"
action = "tiny"
failure = "small"
strategy = "small"
tool_input = "small"
decision = "small"
verification = "small"
generation_decomposition = "medium"
overflow_recovery = "medium"
expansion = "medium"
plan = "large"
summary = "medium"
answer = "large"

[budget_policy.output_ratio]
tiny = 0.04
small = 0.07
medium = 0.12
large = 0.18

[budget_policy.output_floor_ratio]
tiny = 0.02
small = 0.04
medium = 0.07
large = 0.10

[budget_policy.output_ratio_by_kind]
tool_input = 0.12
plan = 0.30

[budget_policy.output_floor_ratio_by_kind]
tool_input = 0.08
plan = 0.22

[budget_policy.structured_output_json_factor_by_contract]
prompt_analysis = 1.15
task_decision = 1.15
active_session_control = 1.10
task_expansion = 1.15
task_plan = 1.10
strategy_selection = 1.10
failure_classification = 1.10
action_selection = 1.10
