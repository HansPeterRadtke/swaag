# -----------------------------------------------------------
# [context_policy] — CONTEXT ASSEMBLY PRIORITIES AND TOKEN HINTS
# ADVANCED TUNING — controls which context sections get priority
# when the input budget is tight.
# component_priorities: higher = more likely to be included.
# -----------------------------------------------------------
[context_policy]
guidance_item_token_hint = 96
skill_metadata_token_hint = 96
skill_instruction_token_hint = 192
recent_result_token_hint = 80
retrieval_preview_items = 2
retrieval_preview_chars = 200

[context_policy.component_priorities]
working_memory = 100.0
plan = 96.0
strategy = 94.0
guidance = 92.0
environment = 90.0
environment_files = 88.0
semantic_memory = 84.0
skills = 80.0
project_state = 72.0
skill_metadata = 68.0
recent_results = 62.0
active_entities = 60.0
notes = 54.0

# -----------------------------------------------------------
# [selection_policy] — RETRIEVAL WEIGHTS, SCORING, SKILL SELECTION
# ADVANCED TUNING — controls the semantic retrieval pipeline.
#
# Structural signal weights: zero-to-one values added to candidates
# before the LLM ranker applies its semantic relevance score.
# Higher = stronger boost for that source type during shortlisting.
#
# retrieval_scoring_text_chars: how many chars of each candidate's text
# are sent to the LLM relevance scorer per query.
# -----------------------------------------------------------
[selection_policy]
retrieval_history_item_token_hint = 96
retrieval_semantic_item_token_hint = 96
retrieval_environment_item_token_hint = 256
skill_nondiscriminative_delta = 0.05
history_query_max_results = 8

# Structural signal weights used when building ranking candidates.
retrieval_structural_tool_message = 0.75
retrieval_structural_user_message = 0.35
retrieval_structural_failed_event = 0.20
retrieval_structural_summary_event = 0.12
retrieval_structural_modified_file = 0.50
retrieval_structural_procedural_memory = 0.50
retrieval_trust_untrusted_memory = 0.25

# Ranking-text preview lengths (chars) used when building candidate text
# for the backend ranker. Shorter = faster ranking; longer = more signal.
retrieval_history_ranking_chars = 280
retrieval_event_ranking_chars = 240
retrieval_file_ranking_chars = 400

# Maximum chars of candidate text sent to the LLM relevance scorer per call.
# Should be >= the largest retrieval_*_ranking_chars value above.
retrieval_scoring_text_chars = 400

# History detail query scoring constants.
# token_score: score added per query token found in event payload
# exact_score: score added per quoted exact phrase found
# type_bonus: extra score for preferred event types (tool, shell, file)
# preview_chars: how many payload chars to include in match previews
history_detail_token_score = 2
history_detail_exact_score = 4
history_detail_type_bonus = 1
history_detail_preview_chars = 320

# -----------------------------------------------------------
# [external_benchmarks] — OPTIONAL OFFICIAL BENCHMARK HARNESSES
# ADVANCED / INFRA TUNING — these wire the project to official
# benchmark runners without hard-coding environment-specific paths.
#
# The project-owned command path stays stable:
#   python -m swaag.benchmark external smoke|run ...
#
# The benchmark-specific commands below are the real commands invoked
# by that harness. They can be overridden in local.toml or via
# SWAAG__EXTERNAL_BENCHMARKS__TARGETS__... env overrides.
# -----------------------------------------------------------
[external_benchmarks]
root = ".swaag/external_benchmarks"
smoke_timeout_seconds = 90
full_timeout_seconds = 1800

[external_benchmarks.model_server]
preflight_enabled = true
healthcheck_timeout_seconds = 5
retry_attempts = 3
retry_sleep_seconds = 2.0

[external_benchmarks.terminal_bench]
compose_probe_timeout_seconds = 5
compose_download_timeout_seconds = 60
allow_compose_download = true

[external_benchmarks.agent_generation]
default_max_instances = 1
clone_timeout_seconds = 300
agent_timeout_seconds = 900
agent_context_limit = 2048
model_timeout_seconds = 180
model_structured_timeout_seconds = 240
allow_stateful_tools = true
allow_side_effect_tools = true
# Real-agent benchmark runs still need enough room for at least
# inspect/edit/verify/respond style plans, but large plans make local
# structured planning much more fragile on bounded contexts.
planner_max_plan_steps = 4
planner_max_replans = 1
runtime_max_reasoning_steps = 16
runtime_max_total_actions = 40
runtime_max_tool_steps = 24
runtime_tool_call_budget = 24
candidate_file_limit = 2
file_excerpt_char_limit = 900
issue_prompt_char_limit = 1200
completion_max_tokens = 192
solver_max_attempts = 2
summary_max_chars = 120
find_max_chars = 800
replace_max_chars = 1600
git_remote_base_url = "https://github.com"
model_name_or_path = "swaag/real-agent-cli"
prompt_template = """
You are solving a local SWE-bench benchmark instance inside the current repository checkout.
Task contract:
{{"task_kind":"local_repo_code_fix","request_completeness":"complete","requires_code_changes":true,"requires_verification":true,"prefer_task_expansion":false}}
Treat this benchmark issue as complete enough to start working immediately.
Do not expand the task just because the prompt includes background context or hints.
Apply code changes directly to files in the workspace.
Aim for the smallest reasonable patch that addresses the issue.
This is a coding task, not a reading-only task.
You must inspect code, edit files, and verify the fix locally.
Do not ask for clarification; use the issue text and hints.
Keep your internal plan short and concrete: prefer read -> edit -> verify -> respond.
Do the work in the repository instead of replying with a plan-only answer.
Start by reading the named failing test file or files.
If the failing test list only gives a test name, search for that exact test name first.
Then inspect the implementation touched by those tests or by the named symbol in the issue.
Avoid editing docs, changelogs, vendored code, generated files, or unrelated tests unless the issue explicitly targets them.
Prefer one source change and then verify the named failing tests.
Use repo-relative paths only when you mention paths.
Do not restate the full issue text or large file paths in your plan.

Repository: {repo}
Instance: {instance_id}

Problem statement:
{problem_statement}

Known failing tests:
{fail_to_pass_tests}

Hints:
{hints_text}
"""
empty_patch_retry_prompt = """
Task contract:
{"task_kind":"local_repo_code_fix","request_completeness":"complete","requires_code_changes":true,"requires_verification":true,"prefer_task_expansion":false}
You have not produced any file changes yet for this SWE-bench instance.
Make one best-effort concrete code change now in the current repository checkout.
Do not ask for clarification.
Keep the plan as short as possible: inspect -> edit -> verify -> respond.
Prefer one concrete source-file change over wrapper scripts.
Use real repo-relative file paths and directly executable commands only.
Repository: {repo}
Instance: {instance_id}
Problem statement:
{problem_statement}
Known failing tests:
{fail_to_pass_tests}
Hints:
{hints_text}
"""

[external_benchmarks.targets.swebench_lite]
enabled = true
description = "Official SWE-bench Lite evaluation via swebench.harness.run_evaluation."
workdir = "."
default_variables = { dataset_name_args = "--dataset_name princeton-nlp/SWE-bench_Lite", namespace_args = "--namespace none" }
preflight_commands = [["docker", "version"]]
smoke_command = ["python3", "-m", "swebench.harness.run_evaluation", "--help"]
full_command = ["python3", "-m", "swebench.harness.run_evaluation", "@args:{dataset_name_args}", "--predictions_path", "{predictions_path}", "@args:{instance_ids_args}", "@args:{namespace_args}", "@args:{cache_args}", "--max_workers", "1", "--run_id", "{run_id}", "--report_dir", "{output_dir}"]
required_env = []
required_paths = ["{predictions_path}"]
allowed_path_literals = ["gold"]
artifact_globs = ["evaluation_results/**/*", "logs/**/*"]

